<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nepal Jokes Hub - दैनिक राजनीतिक हास्य</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Merriweather:ital,wght@0,400;1,700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a1a2e;
            --secondary: #16213e;
            --accent: #e94560;
            --highlight: #f1c40f;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --card-bg: #0f3460;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Nepal Pattern Background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 80%, rgba(233, 69, 96, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(241, 196, 15, 0.08) 0%, transparent 50%),
                repeating-linear-gradient(
                    45deg,
                    transparent,
                    transparent 50px,
                    rgba(255,255,255,0.01) 50px,
                    rgba(255,255,255,0.01) 100px
                );
            pointer-events: none;
            z-index: 0;
        }

        /* Header */
        header {
            background: linear-gradient(135deg, var(--secondary) 0%, var(--primary) 100%);
            padding: 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 3px solid var(--accent);
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.5rem;
            color: var(--accent);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            letter-spacing: 2px;
        }

        .logo span {
            color: var(--highlight);
        }

        .date-display {
            text-align: right;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .date-display .english-date {
            font-weight: 600;
            color: var(--text-primary);
        }

        .date-display .nepali-date {
            font-style: italic;
            color: var(--highlight);
        }

        /* Main Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            position: relative;
            z-index: 1;
        }

        /* Hero Section - Daily Joke */
        .hero {
            text-align: center;
            margin-bottom: 50px;
        }

        .hero h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 3rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, var(--accent), var(--highlight));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero p {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        /* Daily Joke Card */
        .daily-joke-card {
            background: linear-gradient(145deg, var(--card-bg), var(--secondary));
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 50px;
            border: 2px solid var(--accent);
            position: relative;
            overflow: hidden;
            animation: fadeIn 0.8s ease-out;
        }

        .daily-joke-card::before {
            content: 'आजको जोक';
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--accent);
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .daily-joke-card .joke-category {
            display: inline-block;
            background: var(--highlight);
            color: var(--primary);
            padding: 5px 15px;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .daily-joke-card .joke-text {
            font-size: 1.4rem;
            line-height: 1.8;
            margin-bottom: 20px;
            font-family: 'Merriweather', serif;
        }

        .daily-joke-card .punchline {
            font-size: 1.6rem;
            color: var(--highlight);
            font-weight: 700;
            padding: 20px;
            background: rgba(241, 196, 15, 0.1);
            border-radius: 10px;
            border-left: 4px solid var(--highlight);
        }

        /* Section Titles */
        .section-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.5rem;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .section-title::before {
            content: '🎭';
            font-size: 2rem;
        }

        /* MP Quotes Section */
        .quotes-section {
            margin-bottom: 50px;
        }

        .quotes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        .quote-card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 25px;
            position: relative;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border-left: 4px solid var(--accent);
        }

        .quote-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(233, 69, 96, 0.2);
        }

        .quote-card .quote-text {
            font-family: 'Merriweather', serif;
            font-size: 1.1rem;
            font-style: italic;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .quote-card .speaker-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .quote-card .speaker-name {
            font-weight: 600;
            color: var(--highlight);
        }

        .quote-card .party-badge {
            background: var(--accent);
            color: white;
            padding: 4px 12px;
            border-radius: 10px;
            font-size: 0.8rem;
        }

        .quote-card .source {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 15px;
            font-style: italic;
        }

        /* News Satire Section */
        .satire-section {
            margin-bottom: 50px;
        }

        .satire-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
        }

        .satire-card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 25px;
            position: relative;
            transition: transform 0.3s ease;
        }

        .satire-card:hover {
            transform: scale(1.02);
        }

        .satire-card .fake-tag {
            background: #ff6b6b;
            color: white;
            padding: 4px 12px;
            border-radius: 5px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 15px;
        }

        .satire-card .headline {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.4rem;
            color: var(--highlight);
            margin-bottom: 15px;
            line-height: 1.3;
        }

        .satire-card .description {
            color: var(--text-secondary);
            line-height: 1.6;
            font-size: 0.95rem;
        }

        /* Random Joke Button */
        .random-joke-section {
            text-align: center;
            margin: 50px 0;
            padding: 40px;
            background: linear-gradient(145deg, var(--secondary), var(--card-bg));
            border-radius: 20px;
        }

        .random-joke-section h2 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2rem;
            margin-bottom: 20px;
        }

        .new-joke-btn {
            background: linear-gradient(135deg, var(--accent), #c73e54);
            color: white;
            border: none;
            padding: 18px 50px;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .new-joke-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(233, 69, 96, 0.4);
        }

        .new-joke-btn:active {
            transform: translateY(0);
        }

        .random-joke-display {
            margin-top: 30px;
            padding: 25px;
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            display: none;
            animation: fadeIn 0.5s ease-out;
        }

        .random-joke-display.show {
            display: block;
        }

        .random-joke-display .joke-text {
            font-size: 1.2rem;
            margin-bottom: 15px;
        }

        /* Footer */
        footer {
            background: var(--secondary);
            padding: 30px 20px;
            text-align: center;
            border-top: 3px solid var(--accent);
        }

        footer p {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        footer .made-with {
            color: var(--accent);
        }

        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .pulse {
            animation: pulse 2s infinite;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .logo {
                font-size: 1.8rem;
            }

            .hero h1 {
                font-size: 2rem;
            }

            .daily-joke-card {
                padding: 25px;
            }

            .daily-joke-card .joke-text {
                font-size: 1.1rem;
            }

            .daily-joke-card .punchline {
                font-size: 1.3rem;
            }

            .section-title {
                font-size: 1.8rem;
            }

            .quotes-grid, .satire-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

                speaker: "प्रधानमन्त्री",
                party: "नेपाली कांग्रेस",
                source: "चुनावी सभा"
            },
            {
                quote: "यो कुरा मैले भनेको होइन, मिडियाले भनेको हो!",
                speaker: "मन्त्री ज्यू",
                party: "माओवादी केन्द्र",
                source: "प्रेस कन्फ्रेन्स"
            }
        ];

        // News Satire Database
        const satireNews = [
            {
                headline: "प्रधानमन्त्रीको सचिवालय: 'शोभा भगवानको! हामी सधैं व्यस्त छौं, तर काम केही छैन!'",
                description: "प्रधानमन्त्री कार्यालय स्रोतका अनुसार, दिनभरि बैठकहरुमा सहभागी हुने र 'हजुर छु' भन्दै समय बिताउने कार्यलाई 'राष्ट्र सेवा' भनि पुष्टि गरिएको छ।"
            },
            {
                headline: "संसदीय समितिको निर्णय: 'यो विषय यति जटिल छ कि हामीले बुझ्नै सकेनौं, त्यसैले अर्को बैठकमा छोड्यौं!'",
                description: "संसदीय समितिका सभापतिले भने - 'हामी सबै नेता हौं, काम गर्ने होइनौं, निर्णय गर्ने हो!' अर्को सदस्यले थपे - 'यो त हाम्रो परम्परा हो!'"
            },
            {
                headline: "मन्त्रालयको वार्षिक प्रतिवेदन: 'हामीले यो वर्ष १००% काम गर्यौं! (तर काम के थियो भन्ने कसैले नबुझ्ने!)'",
                description: "मन्त्रालयका अधिकारीहरुले भने - 'हामीले दैनिक ८ घण्टा कार्यालयमा बिताउँछौं, यसमा काम नभए पनि उपस्थिति १००% छ!'"
            },
            {
                headline: "चुनावी घोषणापत्र: 'हामी यो गर्नेछौं, त्यो गर्नेछौं, अरू के गर्नेछौं भनेर अझै सोचिरहेका छौं!'",
                description: "एक नेतााले भने - 'घोषणापत्र त बनाउनुपर्छ, को पढ्छ भनेर हेर्नुहुन्छ? हामी त पढ्दैनौं, अरुलाई कसरी पढाउने?'"
            },
            {
                headline: "सरकारी निकायको सूचना: 'यो योजना अलपत्र, तर बजेट खर्च भयो १० करोड!'",
                description: "लेखापरिक्षकको प्रतिवेदन अनुसार - 'योजना अधूरो छ, तर पैसा सकिएको छ! अब नयाँ योजना चाहिन्छ, अर्को बजेट चाहिन्छ!'"
            }
        ];

        // Nepali Date (Bikram Sambat approximation)
        const nepaliMonths = [
            "बैशाख", "जेठ", "असार", "श्रावण", "भदौ", "अश्विन", 
            "कार्तिक", "मंसिर", "पौष", "माघ", "फाल्गुन", "चैत्र"
        ];

        // Get today's date
        function getToday() {
            const today = new Date();
            const englishDateStr = today.toLocaleDateString('en-US', { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            });
            
            // Approximate Nepali date (Bikram Sambat)
            const year = today.getFullYear() + 56; // BS is ~56 years ahead
            const month = today.getMonth();
            const day = today.getDate();
            const nepaliDateStr = `${nepaliMonths[month]} ${day}, ${year} BS`;
            
            return { englishDateStr, nepaliDateStr };
        }

        // Get daily joke based on date
        function getDailyJoke() {
            const today = new Date();
            const dayOfYear = Math.floor((today - new Date(today.getFullYear(), 0, 0)) / (1000 * 60 * 60 * 24));
            const index = dayOfYear % jokes.length;
            return jokes[index];
        }

        // Display daily joke
        function displayDailyJoke() {
            const joke = getDailyJoke();
            const container = document.getElementById('dailyJoke');
            container.innerHTML = `
                <span class="joke-category">${joke.category}</span>
                <p class="joke-text">${joke.text}</p>
                <p class="punchline">${joke.punchline}</p>
            `;
        }

        // Display MP quotes
        function displayQuotes() {
            const container = document.getElementById('quotesGrid');
            container.innerHTML = mpQuotes.map(q => `
                <div class="quote-card">
                    <p class="quote-text">"${q.quote}"</p>
                    <div class="speaker-info">
                        <span class="speaker-name">- ${q.speaker}</span>
                        <span class="party-badge">${q.party}</span>
                    </div>
                    <p class="source">स्रोत: ${q.source}</p>
                </div>
            `).join('');
        }

        // Display satire news
        function displaySatire() {
            const container = document.getElementById('satireGrid');
            container.innerHTML = satireNews.map(s => `
                <div class="satire-card">
                    <span class="fake-tag">FAKE NEWS</span>
                    <h3 class="headline">${s.headline}</h3>
                    <p class="description">${s.description}</p>
                </div>
            `).join('');
        }

        // Show random joke
        function showRandomJoke() {
            const randomIndex = Math.floor(Math.random() * jokes.length);
            const joke = jokes[randomIndex];
            const display = document.getElementById('randomJokeDisplay');
            const text = document.getElementById('randomJokeText');
            
            text.innerHTML = `<strong>${joke.category}:</strong> ${joke.text}<br><br><strong>${joke.punchline}</strong>`;
            display.classList.add('show');
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            // Set dates
            const { englishDateStr, nepaliDateStr } = getToday();
            document.getElementById('englishDate').textContent = englishDateStr;
            document.getElementById('nepaliDate').textContent = nepaliDateStr;
            
            // Display content
            displayDailyJoke();
            displayQuotes();
            displaySatire();
        });
    </script>
</body>
